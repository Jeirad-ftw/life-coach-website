# =====================================================================
# Render Blueprint — Static Site
# Docs: https://render.com/docs/blueprint-spec
#
# This deploys the repo as a plain static site. There is no build step
# (pure HTML/CSS/JS), so we publish the repository root directly.
# =====================================================================
services:
  - type: web
    name: life-coach-website
    runtime: static
    # No build needed for a static HTML site.
    buildCommand: ""
    # Serve files straight from the repo root (index.html lives here).
    staticPublishPath: .
    # Auto-deploy on every push to the connected branch.
    autoDeploy: true
    # Long-cache fingerprint-free assets lightly; HTML stays fresh.
    headers:
      - path: /*
        name: X-Frame-Options
        # ALLOWALL so the page can also be embedded (e.g. in GHL) if desired.
        value: ALLOWALL
    routes:
      # SPA-style fallback is unnecessary (single page), but this keeps
      # any unknown path resolving to the homepage instead of 404.
      - type: rewrite
        source: /*
        destination: /index.html
